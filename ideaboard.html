<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idea Board - UCSC Hub</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Updated to UCSC Theme */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* Padding top accounts for the fixed nav. No left padding since there's no sidebar */
            padding: 85px 20px 0 20px; 
            color: #333;
            background-color: #f9fafb;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Navigation Bar (Maroon Theme) */
        .top-nav {
            width: 100%;
            background-color: #800000; /* UCSC Maroon */
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            position: fixed; 
            top: 0;
            left: 0;
            z-index: 1000; 
        }

        .nav-logo {
            color: #ffcc00; /* UCSC Gold */
            font-size: 1.5rem;
            font-weight: 700;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 15px;
        }

        .nav-links li a {
            color: #f9fafb;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-links li a:hover {
            color: #ffcc00;
            background-color: rgba(255, 204, 0, 0.1);
        }

        .nav-links li a.active {
            color: #800000;
            background-color: #ffcc00;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .theme-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            filter: grayscale(100%) brightness(200%);
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        .theme-btn:hover {
            opacity: 1;
        }

        /* Idea Board Container */
        .board-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 800px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            margin-bottom: 40px;
            margin-top: 20px;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .board-header {
            background: #ffffff;
            padding: 25px;
            text-align: center;
            border-bottom: 2px solid #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            transition: background-color 0.3s ease;
        }

        .logo {
            font-size: 2rem;
        }

        .board-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #800000; /* Changed from blue to maroon */
        }

        .input-section {
            display: flex;
            gap: 15px;
            padding: 30px;
            background-color: #fafbfc;
            border-bottom: 1px solid #e1e4e8;
            flex-wrap: wrap;
            transition: background-color 0.3s ease;
        }

        #name-select, #idea-input, #add-btn {
            padding: 14px 18px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            background-color: #ffffff;
        }

        #name-select:focus, #idea-input:focus {
            border-color: #800000; /* Maroon focus */
            box-shadow: 0 0 0 3px rgba(128, 0, 0, 0.15);
        }

        #name-select { flex: 1; min-width: 160px; cursor: pointer; }
        #idea-input { flex: 3; min-width: 220px; color: #333; }

        #add-btn {
            background-color: #800000; /* Maroon Button */
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
            min-width: 130px;
            box-shadow: 0 4px 6px rgba(128, 0, 0, 0.2);
        }

        #add-btn:hover {
            background-color: #660000; /* Darker Maroon */
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(128, 0, 0, 0.3);
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px 0 30px;
            font-weight: 600;
            color: #6b7280;
        }

        .secondary-btn {
            background-color: #f3f4f6;
            color: #ef4444;
            border: 1px solid #e5e7eb;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .secondary-btn:hover {
            background-color: #fee2e2;
            border-color: #fca5a5;
        }

        .list-section {
            padding: 20px 30px 30px 30px;
        }

        #idea-list {
            list-style-type: none;
        }

        #idea-list li {
            padding: 18px 22px;
            background-color: #ffffff;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            border-left: 5px solid #ffcc00; /* Gold accent line */
            font-size: 1.05rem;
            color: #1f2937;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.03);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.3s ease;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        #idea-list li:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .author {
            color: #6b7280;
            font-size: 0.95rem;
            margin-left: auto;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 1.2rem;
            cursor: pointer;
            margin-left: 12px;
            padding: 0 5px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .delete-btn:hover {
            background-color: #fee2e2;
            color: #b91c1c;
        }

        .page-footer {
            background-color: #800000; /* Maroon Footer */
            color: #ffcc00; /* Gold text */
            font-size: 0.95rem;
            text-align: center;
            padding: 20px;
            width: 100%;
            margin-top: auto; /* Pushes footer to the very bottom */
        }

        /* --- Dark Mode Overrides --- */
        body.dark-mode {
            background-color: #111827;
            color: #f9fafb;
        }
        body.dark-mode .board-container, 
        body.dark-mode .board-header {
            background-color: #1f2937;
            border-color: #374151;
        }
        body.dark-mode .input-section {
            background-color: #111827;
            border-color: #374151;
        }
        body.dark-mode .board-header h1 { color: #ffcc00; }
        body.dark-mode #name-select, 
        body.dark-mode #idea-input {
            background-color: #1f2937;
            color: #f9fafb;
            border-color: #374151;
        }
        body.dark-mode #idea-list li {
            background-color: #111827;
            color: #cbd5e1;
            border-color: #374151;
        }
        body.dark-mode .list-header { color: #cbd5e1; }
        body.dark-mode .secondary-btn {
            background-color: #374151;
            border-color: #4b5563;
        }
        body.dark-mode .secondary-btn:hover {
            background-color: #7f1d1d;
            color: #fca5a5;
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-logo">UCSC Hub</div>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="ideaboard.html" class="active">Idea Board</a></li>
            <li><a href="timer.html">Study Timer</a></li>
            <li><a href="gpa.html">GPA Calculator</a></li>
        </ul>
        
        <button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme">
            <span class="icon sun">☀️</span>
            <span class="icon moon" style="display: none;">🌙</span>
        </button>
    </nav>

    <div class="board-container">
        <header class="board-header">
            <span class="logo">💡</span>
            <h1>Group Idea Board</h1>
        </header>
        
        <div class="input-section">
            <select id="name-select" aria-label="Select your name">
                <option value="" disabled selected>Select your name...</option>
                <option value="Vidul">Vidul</option>
                <option value="Chandula">Chandula</option>
                <option value="Amasha">Amasha</option>
                <option value="Yasandi">Yasandi</option>
                <option value="Anusara">Anusara</option>
                <option value="Ayal">Ayal</option>
                <option value="Miron">Miron</option>
                <option value="Krishanth">Krishanth</option>
                <option value="Lochana">Lochana</option>
                <option value="Didula">Didula</option>
            </select>
            <input type="text" id="idea-input" placeholder="Enter your idea here..." aria-label="Enter your idea">
            <button id="add-btn">Add Idea</button>
        </div>

        <div class="list-header">
            <span id="idea-count">Total Ideas: 0</span>
            <button id="clear-btn" class="secondary-btn">Clear All</button>
        </div>

        <div class="list-section">
            <ul id="idea-list"></ul>
        </div>
    </div>

    <footer class="page-footer">
        <p>&copy; 2026 Group Assignment Project. All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- Theme Toggle Logic ---
            const themeBtn = document.getElementById('theme-toggle');
            const sunIcon = document.querySelector('.sun');
            const moonIcon = document.querySelector('.moon');

            if (themeBtn) {
                themeBtn.addEventListener('click', () => {
                    document.body.classList.toggle('dark-mode');
                    
                    if (document.body.classList.contains('dark-mode')) {
                        sunIcon.style.display = 'none';
                        moonIcon.style.display = 'inline';
                    } else {
                        sunIcon.style.display = 'inline';
                        moonIcon.style.display = 'none';
                    }
                });
            }

            // --- Idea Board Logic ---
            let ideas = [];

            const addBtn = document.getElementById('add-btn');
            const nameSelect = document.getElementById('name-select');
            const ideaInput = document.getElementById('idea-input');
            const ideaList = document.getElementById('idea-list');
            const ideaCountDisplay = document.getElementById('idea-count');
            const clearBtn = document.getElementById('clear-btn');

            function renderIdeas() {
                ideaList.innerHTML = '';

                ideas.forEach((idea, index) => {
                    const newListItem = document.createElement('li');
                    const ideaTextNode = document.createTextNode(idea.text);
                    
                    const authorSpan = document.createElement('span');
                    authorSpan.className = 'author';
                    authorSpan.textContent = `– suggested by ${idea.author}`;

                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'delete-btn';
                    deleteBtn.innerHTML = '&times;'; 
                    deleteBtn.title = 'Remove this idea';
                    
                    deleteBtn.addEventListener('click', () => {
                        ideas.splice(index, 1); 
                        renderIdeas(); 
                    });

                    newListItem.appendChild(ideaTextNode);
                    newListItem.appendChild(authorSpan);
                    newListItem.appendChild(deleteBtn); 
                    ideaList.appendChild(newListItem);
                });

                ideaCountDisplay.textContent = `Total Ideas: ${ideas.length}`;
            }

            function addIdea() {
                const name = nameSelect.value;
                const ideaText = ideaInput.value.trim();

                if (!name) {
                    alert('Please select your name from the dropdown.');
                    return;
                }
                if (ideaText === '') {
                    alert('Please type an idea before adding.');
                    return;
                }

                const newIdea = { text: ideaText, author: name };
                ideas.push(newIdea);
                renderIdeas();
                ideaInput.value = '';
            }

            function clearIdeas() {
                if (confirm("Are you sure you want to clear all ideas?")) {
                    ideas = [];
                    renderIdeas();
                }
            }

            addBtn.addEventListener('click', addIdea);
            ideaInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') { addIdea(); }
            });
            
            clearBtn.addEventListener('click', clearIdeas);

            renderIdeas();
        });
    </script>
</body>
</html>
