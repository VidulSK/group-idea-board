<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idea Board - Student Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="top">
    <nav class="top-nav">
        <div class="nav-logo">💡 Student Hub</div>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="ideaboard.html" class="active">Idea Board</a></li>
            <li><a href="timer.html">Study Timer</a></li>
            <li><a href="gpa.html">GPA Calculator</a></li>
        </ul>
        
        <button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme">
            <span class="icon sun">☀️</span>
            <span class="icon moon" style="display: none;">🌙</span>
        </button>
    </nav>

    <aside class="sidebar">
        <ul class="sidebar-links">
            <li><a href="home.html#about">About Us</a></li>
            <li><a href="home.html#vision-mission">Vision & Mission</a></li>
            <li><a href="home.html#events">Upcoming Events</a></li>
            <li><a href="home.html#faq">FAQ</a></li>
        </ul>
    </aside>

    <main class="home-main" style="padding: 40px; display: flex; justify-content: center;">
        
        <div class="board-container" style="margin-top: 20px;">
            <header class="board-header">
                <span class="logo">💡</span>
                <h1 style="color: #800000;">Group Idea Board</h1>
            </header>
            
            <div class="input-section">
                <select id="name-select" aria-label="Select your name">
                    <option value="" disabled selected>Select your name...</option>
                    <option value="Nimal">Nimal</option>
                    <option value="Sara">Sara</option>
                    <option value="Alex">Alex</option>
                    <option value="Chandula">Chandula</option>
                </select>
                <input type="text" id="idea-input" placeholder="Enter your idea here..." aria-label="Enter your idea">
                <button id="add-btn">Add Idea</button>
            </div>

            <div class="list-header">
                <span id="idea-count">Total Ideas: 0</span>
                <button id="clear-btn" class="secondary-btn">Clear All</button>
            </div>

            <div class="list-section">
                <ul id="idea-list"></ul>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
