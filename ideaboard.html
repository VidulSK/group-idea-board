<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Idea Board</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* The Moving Gradient Setup */
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #333;
            background: linear-gradient(135deg, #78B9B5, #0F828C, #320A6B);
            background-size: 300% 300%;
            animation: slideGradient 8s ease infinite;
        }

        @keyframes slideGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .board-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 800px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .board-header {
            background: #ffffff;
            padding: 25px;
            text-align: center;
            border-bottom: 2px solid #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-size: 2rem;
        }

        .board-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2b5876;
        }

        .input-section {
            display: flex;
            gap: 15px;
            padding: 30px;
            background-color: #fafbfc;
            border-bottom: 1px solid #e1e4e8;
            flex-wrap: wrap;
        }

        #name-select, #idea-input, #add-btn {
            padding: 14px 18px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            background-color: #ffffff;
        }

        #name-select:focus, #idea-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        #name-select { flex: 1; min-width: 160px; cursor: pointer; }
        #idea-input { flex: 3; min-width: 220px; }

        #add-btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
            min-width: 130px;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2);
        }

        #add-btn:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(59, 130, 246, 0.3);
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px 0 30px;
            font-weight: 600;
            color: #6b7280;
        }

        .secondary-btn {
            background-color: #f3f4f6;
            color: #ef4444;
            border: 1px solid #e5e7eb;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .secondary-btn:hover {
            background-color: #fee2e2;
            border-color: #fca5a5;
        }

        .list-section {
            padding: 20px 30px 30px 30px;
        }

        #idea-list {
            list-style-type: none;
        }

        #idea-list li {
            padding: 18px 22px;
            background-color: #ffffff;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            border-left: 5px solid #3b82f6;
            font-size: 1.05rem;
            color: #1f2937;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.03);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        #idea-list li:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .author {
            color: #6b7280;
            font-size: 0.95rem;
            margin-left: auto;
        }

        .page-footer {
            color: #e2e8f0;
            font-size: 0.95rem;
            text-align: center;
            margin-top: 10px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 1.2rem;
            cursor: pointer;
            margin-left: 12px;
            padding: 0 5px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .delete-btn:hover {
            background-color: #fee2e2;
            color: #b91c1c;
        }
    </style>
</head>
<body>
    <div class="board-container">
        <header class="board-header">
            <span class="logo">💡</span>
            <h1>Group Idea Board</h1>
        </header>
        
        <div class="input-section">
            <select id="name-select" aria-label="Select your name">
                <option value="" disabled selected>Select your name...</option>
                <option value="Vidul">Vidul</option>
                <option value="Chandula">Chandula</option>
                <option value="Amasha">Amasha</option>
                <option value="Yasandi">Yasandi</option>
                <option value="Anusara">Anusara</option>
                <option value="Ayal">Ayal</option>
                <option value="Miron">Miron</option>
                <option value="Krishanth">Krishanth</option>
                <option value="Lochana">Lochana</option>
                <option value="Didula">Didula</option>
            </select>
            <input type="text" id="idea-input" placeholder="Enter your idea here..." aria-label="Enter your idea">
            <button id="add-btn">Add Idea</button>
        </div>

        <div class="list-header">
            <span id="idea-count">Total Ideas: 0</span>
            <button id="clear-btn" class="secondary-btn">Clear All</button>
        </div>

        <div class="list-section">
            <ul id="idea-list"></ul>
        </div>
    </div>

    <footer class="page-footer">
        <p>&copy; 2026 Group Assignment Project. All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let ideas = [];

            const addBtn = document.getElementById('add-btn');
            const nameSelect = document.getElementById('name-select');
            const ideaInput = document.getElementById('idea-input');
            const ideaList = document.getElementById('idea-list');
            const ideaCountDisplay = document.getElementById('idea-count');
            const clearBtn = document.getElementById('clear-btn');

            function renderIdeas() {
                ideaList.innerHTML = '';

                ideas.forEach((idea, index) => {
                    const newListItem = document.createElement('li');
                    const ideaTextNode = document.createTextNode(idea.text);
                    
                    const authorSpan = document.createElement('span');
                    authorSpan.className = 'author';
                    authorSpan.textContent = `– suggested by ${idea.author}`;

                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'delete-btn';
                    deleteBtn.innerHTML = '&times;'; 
                    deleteBtn.title = 'Remove this idea';
                    
                    deleteBtn.addEventListener('click', () => {
                        ideas.splice(index, 1); 
                        renderIdeas(); 
                    });

                    newListItem.appendChild(ideaTextNode);
                    newListItem.appendChild(authorSpan);
                    newListItem.appendChild(deleteBtn); 
                    ideaList.appendChild(newListItem);
                });

                ideaCountDisplay.textContent = `Total Ideas: ${ideas.length}`;
            }

            function addIdea() {
                const name = nameSelect.value;
                const ideaText = ideaInput.value.trim();

                if (!name) {
                    alert('Please select your name from the dropdown.');
                    return;
                }
                if (ideaText === '') {
                    alert('Please type an idea before adding.');
                    return;
                }

                const newIdea = { text: ideaText, author: name };
                ideas.push(newIdea);
                renderIdeas();
                ideaInput.value = '';
            }

            function clearIdeas() {
                if (confirm("Are you sure you want to clear all ideas?")) {
                    ideas = [];
                    renderIdeas();
                }
            }

            addBtn.addEventListener('click', addIdea);
            ideaInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') { addIdea(); }
            });
            
            clearBtn.addEventListener('click', clearIdeas);

            renderIdeas();
        });
    </script>
</body>
</html>
