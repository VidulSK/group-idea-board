<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Timer - Student Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="timer-page">

    <nav class="top-nav">
        <div class="nav-logo">💡 Student Hub</div>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="index.html">Idea Board</a></li>
            <li><a href="timer.html" class="active">Study Timer</a></li>
            <li><a href="gpa.html">GPA Calculator</a></li>
        </ul>
        
        <button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme">
            <span class="icon sun">☀️</span>
            <span class="icon moon" style="display: none;">🌙</span>
        </button>
    </nav>

    <div class="timer-dashboard">
        <div class="timer-card">
            <h1 class="page-title" style="border:none; margin-bottom: 10px;">Focus Timer</h1>
            <div id="timer">25:00</div>
            <div id="status">Ready</div>

            <div class="timer-controls">
                <button id="start">Start</button>
                <button id="pause">Pause</button>
                <button id="reset">Reset</button>
            </div>
        </div>

        <div class="bottom-row">
            <div class="tasks-card">
                <h2>Tasks</h2>
                <div class="task-input">
                    <input type="text" id="taskNameInput" placeholder="Enter Task Name...">
                    <button id="addTask">Add</button>
                </div>
                <div class="task-list" id="taskList"></div>
            </div>

            <div class="progress-card">
                <h2>Daily Progress</h2>
                <div class="progress-circle-container">
                    <svg class="progress-ring" width="120" height="120">
                        <circle class="progress-ring__background" stroke="#e5e7eb" stroke-width="10" fill="transparent" r="50" cx="60" cy="60"/>
                        <circle class="progress-ring__circle" stroke="#800000" stroke-width="10" fill="transparent" r="50" cx="60" cy="60"/>
                    </svg>
                    <div class="progress-text" id="todayMinutes">0 min</div>
                </div>
                <div class="progress-info">
                    <p>Yesterday: <span id="yesterdayMinutes">0</span> min</p>
                    <p>Streak: <span id="streakDays">0</span> days</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

    <script>
        const alarmSound = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');

        let tasks = [];
        let currentTaskIndex = null;
        let timeLeft = 25 * 60;
        let timerId = null;

        const timerDisplay = document.getElementById('timer');
        const statusLabel = document.getElementById('status');
        const taskList = document.getElementById('taskList');
        const taskInput = document.getElementById('taskNameInput');

        function updateUI() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            const formatted = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            timerDisplay.textContent = formatted;
            document.title = `${formatted} - Focus`;

            if (currentTaskIndex !== null) {
                tasks[currentTaskIndex].minutesCompleted = 25 * 60 - timeLeft;
                tasks[currentTaskIndex].element.querySelector('.task-minutes').textContent = 
                    `${Math.floor(tasks[currentTaskIndex].minutesCompleted / 60)} min`;
            }
        }

        function startTimer() {
            if (timerId !== null || currentTaskIndex === null) {
                if (currentTaskIndex === null) alert("Please select a task from the list first!");
                return;
            }
            statusLabel.textContent = `Focusing: ${tasks[currentTaskIndex].name}`;
            timerId = setInterval(() => {
                if (timeLeft > 0) { 
                    timeLeft--; 
                    updateUI(); 
                } else { 
                    clearInterval(timerId);
                    timerId = null;
                    alarmSound.play();
                    alert('Task Finished!');
                    resetTimer();
                }
            }, 1000);
        }

        function pauseTimer() { 
            clearInterval(timerId); 
            timerId = null; 
            statusLabel.textContent = 'Paused'; 
            alarmSound.pause(); 
            alarmSound.currentTime = 0; 
        }

        function resetTimer() { 
            pauseTimer(); 
            timeLeft = 25 * 60; 
            updateUI(); 
            statusLabel.textContent = 'Ready'; 
        }

        function renderTask(taskObj, index) {
            const task = document.createElement('div');
            task.classList.add('task-item');
            task.innerHTML = `<span>${taskObj.name} (<span class="task-minutes">0 min</span>)</span><button title="Remove Task">&times;</button>`;
            
            task.querySelector('button').addEventListener('click', (e) => {
                e.stopPropagation();
                task.remove();
                tasks.splice(index, 1);
                if (currentTaskIndex === index) resetTimer();
                currentTaskIndex = null;
            });

            task.addEventListener('click', () => {
                // Highlight active task
                document.querySelectorAll('.task-item').forEach(el => el.style.borderLeft = 'none');
                task.style.borderLeft = '4px solid #800000';
                
                currentTaskIndex = index;
                timeLeft = 25 * 60 - tasks[index].minutesCompleted;
                updateUI();
                statusLabel.textContent = `Selected: ${taskObj.name} - Ready to Start`;
            });

            taskObj.element = task;
            taskList.appendChild(task);
        }

        document.getElementById('addTask').addEventListener('click', () => {
            const name = taskInput.value.trim();
            if (!name) return;
            const taskObj = { name, minutesCompleted: 0, element: null };
            tasks.push(taskObj);
            renderTask(taskObj, tasks.length - 1);
            taskInput.value = ''; 
            taskInput.focus();
        });

        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('addTask').click();
        });

        document.getElementById('start').addEventListener('click', startTimer);
        document.getElementById('pause').addEventListener('click', pauseTimer);
        document.getElementById('reset').addEventListener('click', resetTimer);

        updateUI();
    </script>
</body>
</html>
